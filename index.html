<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Women's Day | Sona Maa</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Particle Canvas -->
    <canvas id="particleCanvas"></canvas>

    <!-- Overlay Background -->
    <div class="bg-overlay"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Initial Envelope/Button -->
        <div id="initial-step" class="step">
            <div class="envelope-wrapper">
                <div class="envelope" id="openBtn">
                    <div class="heart-seal">❤</div>
                    <p class="tap-text">Tap to Open ✨</p>
                </div>
            </div>
        </div>

        <!-- Greeting Content (Hidden Initially) -->
        <div id="greeting-step" class="step hidden">
            <div class="glass-card">
                <div class="inner-content">
                    <div class="decorative-heart top-left">❤</div>
                    <div class="decorative-heart bottom-right">❤</div>

                    <h2 class="sub-heading">Happy International Women's Day</h2>
                    <h1 class="main-heading">Sona Maa</h1>
                    <p class="message">
                        You are the light that shines brightest. Your strength, love, and grace inspire us every single
                        day. <br>
                        Today, and every day, you deserve to be celebrated!
                    </p>
                    <div class="heart-icon-wrapper">
                        <div class="heart-icon">❤</div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
